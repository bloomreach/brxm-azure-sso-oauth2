spring:
  cloud:
    azure:
      active-directory:
        enabled: true
        profile:
          tenant-id: test-realm
        credential:
          client-id: brxm-cms
          client-secret: test-secret
  # Placeholder issuer — overridden by @DynamicPropertySource in SsoIntegrationTest with the real
  # Keycloak URL. Must start with https:// here so LocalOidcSecurityConfig (which activates on
  # http://) does not trigger for MockMvc tests that have no real OIDC server.
  security:
    oauth2:
      client:
        provider:
          azure:
            issuer-uri: https://login.microsoftonline.com/test-realm/v2.0
        registration:
          azure:
            client-id: brxm-cms
            client-secret: test-secret
            scope: openid,profile,email

SSO_ENABLED: "true"

sso:
  logout-url: http://localhost:9999/realms/test-realm/protocol/openid-connect/logout

# Resolve the brXM platform placeholder that LoggingApplicationListener picks up from the classpath
log4j.configurationFile: "classpath:log4j2-test.xml"
logging:
  config: "classpath:log4j2-test.xml"
