spring:
  cloud:
    azure:
      active-directory:
        enabled: true
        profile:
          tenant-id: test-realm
        credential:
          client-id: brxm-cms
          client-secret: test-secret
  # Placeholder issuer — overridden by @DynamicPropertySource in SsoIntegrationTest,
  # required here so Spring context starts without a real Azure tenant.
  security:
    oauth2:
      client:
        provider:
          azure:
            issuer-uri: http://localhost:9999/realms/test-realm
        registration:
          azure:
            client-id: brxm-cms
            client-secret: test-secret
            scope: openid,profile,email

SSO_ENABLED: "true"

# Resolve the brXM platform placeholder that LoggingApplicationListener picks up from the classpath
log4j.configurationFile: "classpath:log4j2-test.xml"
logging:
  config: "classpath:log4j2-test.xml"
